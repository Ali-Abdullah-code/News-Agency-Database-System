<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles - NAMS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar glass" data-tilt data-tilt-max="2" data-tilt-glare data-tilt-max-glare="0.1">
    <div class="logo">📰 NAMS</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="articles.html">Articles</a></li>
      <li><a href="journalists.html">Journalists</a></li>
      <li><a href="editors.html">Editors</a></li>
      <li><a href="subscribers.html">Subscribers</a></li>
    </ul>
  </nav>

  <div class="hero">
    <h1>Article Management</h1>
    <p>Create, publish, and delete articles with style.</p>
  </div>

  <div class="container">
    <div class="form-card glass" data-tilt data-tilt-max="2">
      <h2 class="section-title">Add New Article</h2>
      <form id="add-article-form" onsubmit="event.preventDefault(); addArticle();">
        <div class="form-group">
          <label>Article ID</label>
          <input type="number" id="artid" required>
        </div>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="title" required>
        </div>
        <div class="form-group">
          <label>Content</label>
          <textarea id="content" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label>Journalist ID</label>
          <input type="number" id="journalist" required>
        </div>
        <div class="form-group">
          <label>Editor ID (Optional)</label>
          <input type="number" id="editor">
        </div>
        <div class="form-group">
          <label>Section</label>
          <select id="section">
            <option value="Politics">Politics</option>
            <option value="Technology">Technology</option>
            <option value="Sports">Sports</option>
            <option value="Business">Business</option>
            <option value="Health">Health</option>
            <option value="Entertainment">Entertainment</option>
            <option value="World">World</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Add Article</button>
      </form>
    </div>

    <div class="container glass" style="padding: 2rem;">
      <h2 class="section-title">All Articles</h2>
      <div class="table-wrapper">
        <table class="data-table" id="articles-table">
          <thead>
            <tr>
              <th>ID</th><th>Title</th><th>Journalist</th>
              <th>Section</th><th>Status</th><th>Date</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="articles-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
