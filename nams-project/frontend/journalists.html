<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journalists - NAMS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar glass" data-tilt data-tilt-max="2" data-tilt-glare data-tilt-max-glare="0.1">
    <div class="logo">📰 NAMS</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="articles.html">Articles</a></li>
      <li><a href="journalists.html">Journalists</a></li>
      <li><a href="editors.html">Editors</a></li>
      <li><a href="subscribers.html">Subscribers</a></li>
    </ul>
  </nav>

  <div class="hero">
    <h1>Journalist Management</h1>
    <p>View and manage news agency journalists seamlessly.</p>
  </div>

  <div class="container">
    <div class="form-card glass" data-tilt data-tilt-max="2">
      <h2 class="section-title">Add New Journalist</h2>
      <form id="add-journalist-form" onsubmit="event.preventDefault(); addJournalist();">
        <div class="form-group">
          <label>Employee ID</label>
          <input type="number" id="j-empid" required>
        </div>
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="j-name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="j-email" required>
        </div>
        <div class="form-group">
          <label>Specialty Area</label>
          <input type="text" id="j-specialty" required>
        </div>
        <button type="submit" class="btn btn-primary">Add Journalist</button>
      </form>
    </div>

    <div class="container glass" style="padding: 2rem;">
      <h2 class="section-title">All Journalists</h2>
      <div class="table-wrapper">
        <table class="data-table" id="journalists-table">
          <thead>
            <tr>
              <th>ID</th><th>Name</th><th>Email</th>
              <th>Specialty</th><th>Articles Written</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="journalists-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
